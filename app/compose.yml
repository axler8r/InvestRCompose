services:
  web:
    build:
      context: ..
      dockerfile: app/services/web/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - AGENT_API_URL=http://agent:8000
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    depends_on:
      - agent
    networks:
      - investr-network
    env_file:
      - .env

  agent:
    build:
      context: ..
      dockerfile: app/services/agent/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-placeholder-key}
      - MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - DATA_API_URL=${DATA_API_URL:-http://data-api:8002}
      - SEARCH_API_URL=${SEARCH_API_URL:-http://search-api:8003}
      - OPENBB_API_URL=${OPENBB_API_URL:-http://openbb-api:8001}
      - PRINT_API_URL=${PRINT_API_URL:-http://print-api:8000}
      - ANALYSIS_API_URL=${ANALYSIS_API_URL:-http://analysis-api:8000}
    depends_on:
      - openbb-api
      - data-api
      - search-api
    networks:
      - investr-network
    env_file:
      - .env

  openbb-api:
    build:
      context: ..
      dockerfile: app/services/openbb/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - HOST=0.0.0.0
    networks:
      - investr-network
    env_file:
      - .env

  search-api:
    build:
      context: ..
      dockerfile: app/services/search/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - HOST=0.0.0.0
      - AZURE_AI_SEARCH_SERVICE_ENDPOINT=${AZURE_AI_SEARCH_SERVICE_ENDPOINT:-}
      - AZURE_AI_SEARCH_ADMIN_KEY=${AZURE_AI_SEARCH_ADMIN_KEY:-}
      - AZURE_AI_SEARCH_INDEX_NAME=${AZURE_AI_SEARCH_INDEX_NAME:-investr-documents}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-placeholder-key}
    networks:
      - investr-network
    env_file:
      - .env

  data-api:
    build:
      context: ..
      dockerfile: app/services/data/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - HOST=0.0.0.0
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=investr
    depends_on:
      - mongodb
    networks:
      - investr-network
    env_file:
      - .env

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=investr
    volumes:
      - mongodb_data:/data/db
    networks:
      - investr-network

networks:
  investr-network:
    driver: bridge

volumes:
  mongodb_data:
